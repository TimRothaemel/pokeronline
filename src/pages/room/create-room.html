<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raum erstellen</title>
    <link rel="stylesheet" href="/main.css" />
    <script type="module" src="/src/pages/room/create-room.js"></script>
  </head>
  <body>
    <main>
      <div class="page-shell">
        <div class="page-header">
          <a class="back-link" href="/">Zur Startseite</a>
          <span class="eyebrow">Host Table</span>
          <h1 class="page-title">Create a poker room</h1>
          <p class="page-subtitle">
            Choose your player name, define the room and keep the password private.
          </p>
        </div>
        <div class="setup-room">
          <div class="input-erea">
          <div class="personal-data">
            <label for="name">Name:</label>
            <input type="text" name="name" id="user-name" />
          </div>
          <div class="room-data">
            <label for="room-name">Raum Name:</label>
            <input type="text" name="room-name" id="room-name" />
            <label for="room-password">Passwort</label>
            <input type="password" name="room-password" id="room-password" />
            <input type="submit" value="Fertig">
          </div>
        </div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <a href="/src/pages/legal/impressum.html">Impressum</a>
      <a href="/src/pages/legal/datenschutz.html">Datenschutz</a>
    </footer>
  </body>
</html>
