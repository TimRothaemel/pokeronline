<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobby</title>
    <link rel="stylesheet" href="/main.css" />
    <script type="module" src="/src/pages/lobby/lobby.js"></script>
  </head>
  <body>
    <main>
      <div class="page-header">
        <a class="back-link" href="/">Zur Startseite</a>
        <span class="eyebrow">Waiting Room</span>
        <h1 class="page-title">Lobby</h1>
        <p class="page-subtitle">
          Wait for enough players, add bots if needed, then start the hand.
        </p>
      </div>
      <div class="lobby-informations">
        <div class="lobby-meta">
          <div class="status-chip" id="lobby-status">Loading room ...</div>
          <div class="status-chip" id="host-status">Checking host status ...</div>
        </div>
        <div id="player-list"></div>
        <div class="lobby-settings">
          <button id="add-bot-btn" disabled>Add Bot</button>
          <button id="start-game-btn" disabled>Start Game</button>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <a href="/src/pages/legal/impressum.html">Impressum</a>
      <a href="/src/pages/legal/datenschutz.html">Datenschutz</a>
    </footer>
  </body>
</html>
