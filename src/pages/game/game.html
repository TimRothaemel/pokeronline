<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Poker – Einfaches UI</title>
    <link rel="stylesheet" href="./game.css" />
    <script
      type="module"
      async
      src="/src/scripts/display/display-cards.js"
    ></script>
    <script
      type="module"
      async
      src="/src/scripts/game-loop/game-sequence.js"
    ></script>
    <script type="module" src="/src/scripts/supabase/initialize-supabase.js"></script>
  </head>
  <body>
    <h1>pokeronline</h1>
    <div id="game-area-wrapper">
      <div class="table">
        <div class="cards" id="communitycards">
          <div class="card" id="flop1">–</div>
          <div class="card" id="flop2">–</div>
          <div class="card" id="flop3">–</div>
          <div class="card" id="turn">–</div>
          <div class="card" id="river">–</div>
        </div>
      </div>

      <div id="player-table" class="table">
        <h2>Spieler</h2>
        <div class="cards" id="playercards">
          <div class="card" id="playercard1"></div>
          <div class="card" id="playercard2"></div>
        </div>
        <p>Chips: <span class="chip" id="player-coins"></span></p>
      </div>

      <div id="actions" class="table">
        <button id="btn_checken">Bet</button>
        <button id="btn_mitgehen">Gehen</button>
        <button id="btn_erhoehen">Erhöhe</button>
        <button id="btn_passen">Passe</button>
      </div>
    </div>
  </body>
</html>
