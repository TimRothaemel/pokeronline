<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker – Einfaches UI</title>
    <link rel="stylesheet" href="/main.css" />
    <link rel="stylesheet" href="./game.css" />
    <script
      type="module"
      src="/src/scripts/display/display-cards.js"
    ></script>
    <script
      type="module"
      src="/src/scripts/game-loop/game-sequence.js"
    ></script>
    <script
      type="module"
      src="/src/scripts/supabase/initialize-supabase.js"
    ></script>
  </head>
  <body>
    <h1>pokeronline</h1>
    <div id="game-area-wrapper">
      <div class="table">
        <div class="game-meta">
          <div class="meta-pill">
            Phase
            <span id="phase-label">Waiting</span>
          </div>
          <div class="meta-pill">
            Pot
            <span id="pot-value">0</span>
          </div>
          <div class="meta-pill">
            Current Bet
            <span id="current-bet-value">0</span>
          </div>
        </div>
        <div class="cards" id="communitycards">
          <div class="card" id="flop1">–</div>
          <div class="card" id="flop2">–</div>
          <div class="card" id="flop3">–</div>
          <div class="card" id="turn">–</div>
          <div class="card" id="river">–</div>
        </div>
      </div>

      <div id="player-table" class="table">
        <h2>Spieler</h2>
        <div class="cards" id="playercards">
          <div class="card" id="playercard1"></div>
          <div class="card" id="playercard2"></div>
        </div>
        <div class="message secondary" id="turn-container"></div>
        <div class="message" id="message-container"></div>

        <p>Chips: <span class="chip" id="player-coins"></span></p>
      </div>
      <div id="actions" class="table">
        <button id="btn_checken">Check</button>
        <button id="btn_mitgehen">Call</button>
        <button id="btn_erhoehen">Erhöhe</button>
        <button id="btn_passen">Fold</button>
        <button id="btn_neue_runde">Neue Hand</button>
        <input
          id="raise-amount"
          type="number"
          min="25"
          step="25"
          value="25"
          aria-label="Raise amount"
        />
      </div>
    </div>
    <footer class="site-footer">
      <a href="/src/pages/legal/impressum.html">Impressum</a>
      <a href="/src/pages/legal/datenschutz.html">Datenschutz</a>
    </footer>
  </body>
</html>
